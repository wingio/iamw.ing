name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v6
      - name: Setup Environment Variables
        run: |
          echo "PUBLIC_LASTFM_TOKEN=${{ secrets.LASTFM_TOKEN }}" >> $GITHUB_WORKSPACE/.env
      - name: Install, build, and upload your site
        uses: withastro/action@v6
        with:
          package-manager: pnpm@latest
          cache: true
          node-version: 26
          build-cmd: pnpm approve-builds && pnpm run build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5